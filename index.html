<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>给你一只草莓熊 🐻🍓</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(160deg, #fff9fb 0%, #ffeef5 35%, #f8f0ff 70%, #fff5f0 100%);
  overflow: hidden;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
  position: relative;
}

/* 背景漂浮装饰 */
.bg-dot {
  position: fixed;
  pointer-events: none;
  user-select: none;
  animation: rise linear infinite;
  opacity: 0;
}
@keyframes rise {
  0%   { transform: translateY(100vh) rotate(0deg);  opacity: 0;   }
  8%   { opacity: 0.3; }
  92%  { opacity: 0.18; }
  100% { transform: translateY(-8vh)  rotate(30deg); opacity: 0;   }
}

/* 文字区 */
#text {
  position: absolute;
  top: 13%;
  width: 100%;
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  line-height: 2.2;
  color: #c0527a;
  text-shadow: 0 1px 8px rgba(192,82,122,0.1);
}

/* 光标 */
.cursor {
  display: inline-block;
  width: 1.5px;
  height: 1em;
  background: #c0527a;
  vertical-align: middle;
  margin-left: 1px;
  animation: blink 0.75s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* 艺术感提示文字 */
#hint {
  display: none;
  margin-top: 4px;
  font-size: 27px;
  font-style: italic;
  font-weight: 700;
  letter-spacing: 5px;
  background: linear-gradient(90deg, #f093b0, #c084fc, #60a5fa, #f093b0);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#hint.show {
  display: block;
  animation: hintIn 0.9s ease forwards, shimmer 4s linear 0.9s infinite;
}
@keyframes hintIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes shimmer {
  0%   { background-position: 0%   center; }
  100% { background-position: 300% center; }
}

/* 小熊容器 */
#bearWrap {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  overflow: visible;
}

/* 光晕 */
#bearGlow {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,170,210,0.38) 0%, transparent 68%);
  pointer-events: none;
  opacity: 0;
  z-index: 1;
  transition: opacity 1s ease;
}
#bearWrap.ready #bearGlow {
  opacity: 1;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { transform: scale(0.88); opacity: 0.5; }
  50%       { transform: scale(1.12); opacity: 0.9; }
}

/* 小熊 */
#bear {
  display: block;
  width: 100%;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transform-origin: center bottom;
  transform: scale(0);
  opacity: 0;
  position: relative;
  z-index: 2;
}

/* 入场 */
#bearWrap.enter {
  animation: wrapUp 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes wrapUp {
  0%   { transform: translateX(-50%) translateY(260px); }
  100% { transform: translateX(-50%) translateY(0);     }
}
#bear.enter {
  animation: bearIn 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes bearIn {
  0%   { transform: scale(0.15); opacity: 0; }
  55%  { opacity: 1; }
  100% { transform: scale(1);    opacity: 1; }
}

/* 呼吸 + 轻微摇摆 */
#bear.breath {
  animation: breath 3.2s ease-in-out infinite;
}
@keyframes breath {
  0%   { transform: scale(1)    translateY(0px)   rotate(0deg);    }
  25%  { transform: scale(1.02) translateY(-5px)  rotate(0.7deg);  }
  50%  { transform: scale(1.04) translateY(-10px) rotate(0deg);    }
  75%  { transform: scale(1.02) translateY(-5px)  rotate(-0.7deg); }
  100% { transform: scale(1)    translateY(0px)   rotate(0deg);    }
}

/* 点击弹跳 */
#bear.bounce {
  animation: bearBounce 0.45s ease-out;
}
@keyframes bearBounce {
  0%   { transform: scale(1);    }
  25%  { transform: scale(0.87) translateY(5px);  }
  65%  { transform: scale(1.14) translateY(-5px); }
  100% { transform: scale(1);    }
}

/* 轨道闪光 */
.orbit-wrap {
  position: absolute;
  left: 50%;
  top: 36%;
  width: 0;
  height: 0;
  pointer-events: none;
  z-index: 3;
  animation: spinOrbit var(--dur) linear infinite;
  animation-delay: var(--delay);
}
@keyframes spinOrbit {
  from { transform: rotate(var(--start)); }
  to   { transform: rotate(calc(var(--start) + 360deg)); }
}
.orbit-item {
  position: absolute;
  transform: translateX(var(--radius));
  font-size: 15px;
  user-select: none;
}

/* 点击粒子 */
.particle {
  position: fixed;
  pointer-events: none;
  user-select: none;
  z-index: 9999;
  animation: particleFly var(--dur) ease-out forwards;
}
@keyframes particleFly {
  0%   { opacity: 1; transform: translateY(0px)    translateX(0)          scale(0.4) rotate(var(--r)); }
  100% { opacity: 0; transform: translateY(-145px) translateX(var(--tx))  scale(1.2) rotate(var(--r)); }
}

/* 涟漪 */
.ripple {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(210,110,150,0.18), transparent 70%);
  pointer-events: none;
  z-index: 9998;
  animation: rippleGrow 0.65s ease-out forwards;
}
@keyframes rippleGrow {
  0%   { transform: scale(0); opacity: 1; }
  100% { transform: scale(5); opacity: 0; }
}

/* 结尾文字 */
#outro {
  position: absolute;
  bottom: 24px;
  width: 100%;
  text-align: center;
  pointer-events: none;
}
.outro-line {
  display: block;
  font-size: 19px;
  letter-spacing: 4px;
  color: #c0527a;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 1s ease, transform 1s ease;
  margin: 6px 0;
  text-shadow: 0 1px 10px rgba(192,82,122,0.18);
}
.outro-line.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<div id="text">
  <span id="hint">点一下它试试呢</span>
</div>

<div id="bearWrap">
  <div id="bearGlow"></div>
  <img id="bear" src="bear.png" alt="草莓熊">
</div>

<div id="outro">
  <span class="outro-line" id="line1">草莓熊很喜欢你</span>
  <span class="outro-line" id="line2">我也是</span>
</div>

<script>
// ── 背景装饰粒子 ────────────────────────────
const bgPool = ['🌸','✨','💗','⭐','🌺','💕','🍓','🌷'];
function spawnBg() {
  const el  = document.createElement('div');
  el.className = 'bg-dot';
  el.textContent = bgPool[Math.floor(Math.random() * bgPool.length)];
  const dur = 7 + Math.random() * 9;
  el.style.cssText = `left:${Math.random()*100}vw;font-size:${11+Math.random()*10}px;animation-duration:${dur}s;animation-delay:-${Math.random()*dur}s`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2) * 1000);
}
for (let i = 0; i < 14; i++) spawnBg();
setInterval(spawnBg, 900);

// ── 打字机 ──────────────────────────────────
const lines  = ['我给你写了一个小程序...', '然后它变成了一只小熊 🐻'];
const textEl = document.getElementById('text');
const hint   = document.getElementById('hint');

function typeLine(str, onDone) {
  const row    = document.createElement('div');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  textEl.insertBefore(row,    hint);
  textEl.insertBefore(cursor, hint);
  let i = 0;
  (function step() {
    if (i < str.length) { row.textContent += str[i++]; setTimeout(step, 78); }
    else { cursor.remove(); onDone && setTimeout(onDone, 380); }
  })();
}

typeLine(lines[0], () => typeLine(lines[1], showBear));

// ── 小熊出场 ────────────────────────────────
const wrap = document.getElementById('bearWrap');
const bear = document.getElementById('bear');

function showBear() {
  wrap.classList.add('enter');
  bear.classList.add('enter');

  bear.addEventListener('animationend', function handler() {
    bear.removeEventListener('animationend', handler);
    bear.classList.remove('enter');
    bear.style.transform = 'scale(1)';
    bear.style.opacity   = '1';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bear.classList.add('breath');
      wrap.classList.add('ready');
      hint.classList.add('show');
      startSparkles();
    }));
  });
}

// ── 轨道闪光 ────────────────────────────────
function startSparkles() {
  const cfg = [
    { sym: '✨', r: 158, start:   0, dur: 5.0 },
    { sym: '🌟', r: 148, start:  90, dur: 6.2 },
    { sym: '💫', r: 162, start: 180, dur: 4.6 },
    { sym: '⭐', r: 152, start: 270, dur: 5.5 },
  ];
  cfg.forEach(c => {
    const ow = document.createElement('div');
    ow.className = 'orbit-wrap';
    ow.style.setProperty('--dur',   c.dur + 's');
    ow.style.setProperty('--start', c.start + 'deg');
    ow.style.setProperty('--delay', (-Math.random() * c.dur) + 's');

    const oi = document.createElement('div');
    oi.className = 'orbit-item';
    oi.textContent = c.sym;
    oi.style.setProperty('--radius', c.r + 'px');

    ow.appendChild(oi);
    wrap.appendChild(ow);
  });
}

// ── 音频（预加载全部，消除点击延迟）───────────
const audioPool = [
  '4月17日 (5).wav','4月17日 (5)(1).wav','4月17日 (5)(2).wav',
  '4月17日 (5)(3).wav','4月17日 (5)(4).wav','4月17日 (5)(5).wav',
  '4月17日 (5)(6).wav','4月17日 (5)(7).wav','4月17日 (5)(8).wav',
  '4月17日 (5)(9).wav','4月17日 (5)(11).wav','4月17日 (5)(15).wav',
  '4月17日 (5)(12).wav','4月17日 (5)(13).wav','4月17日 (5)(14).wav',
].map(f => {
  const a = new Audio('yinxiao/' + encodeURIComponent(f));
  a.preload = 'auto';
  return a;
});

const RAPID_MS  = 1200;
let curAudio    = null;
let lastClickAt = 0;

function playSound() {
  const now     = Date.now();
  const isRapid = curAudio && (now - lastClickAt) < RAPID_MS;
  lastClickAt   = now;

  if (isRapid) {
    curAudio.currentTime = 0;
    curAudio.play();
  } else {
    if (curAudio) { curAudio.pause(); curAudio.currentTime = 0; }
    curAudio = audioPool[Math.floor(Math.random() * audioPool.length)];
    curAudio.currentTime = 0;
    curAudio.play();
  }
}

// ── 点击效果 ────────────────────────────────
let totalParticles = 0;
let outroShown     = false;
const heartPool    = ['❤️','💕','💗','💓','💞'];

function clickEffect(cx, cy) {
  playSound();

  // 涟漪
  const rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.cssText = `width:100px;height:100px;left:${cx-50}px;top:${cy-50}px`;
  document.body.appendChild(rip);
  setTimeout(() => rip.remove(), 700);

  // 草莓 + 爱心粒子
  const n = 7 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const isBerry = Math.random() < 0.42;
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = isBerry ? '🍓' : heartPool[Math.floor(Math.random() * heartPool.length)];
      const ox  = (Math.random() - 0.5) * 140;
      const sz  = isBerry ? (22 + Math.random() * 12) : (13 + Math.random() * 7);
      const dur = (0.9 + Math.random() * 0.4) + 's';
      p.style.cssText = `left:${cx+ox-12}px;top:${cy-10}px;font-size:${sz}px`;
      p.style.setProperty('--r',   ((Math.random() - 0.5) * 42) + 'deg');
      p.style.setProperty('--tx',  ((Math.random() - 0.5) * 65) + 'px');
      p.style.setProperty('--dur', dur);
      document.body.appendChild(p);
      totalParticles++;
      setTimeout(() => p.remove(), 1400);

      if (!outroShown && totalParticles >= 28) {
        outroShown = true;
        setTimeout(showOutro, 2000);
      }
    }, i * 45);
  }

  // 小熊弹跳
  bear.classList.remove('breath', 'bounce');
  void bear.offsetWidth;
  bear.classList.add('bounce');
  bear.addEventListener('animationend', function h2() {
    bear.removeEventListener('animationend', h2);
    bear.classList.remove('bounce');
    bear.classList.add('breath');
  });
}

function showOutro() {
  document.getElementById('line1').classList.add('show');
  setTimeout(() => document.getElementById('line2').classList.add('show'), 1100);
}

bear.addEventListener('click', e => clickEffect(e.clientX, e.clientY));
bear.addEventListener('touchstart', e => {
  e.preventDefault();
  clickEffect(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
</script>
</body>
</html>
