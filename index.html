<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>给你一只草莓熊 🐻🍓</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  overflow: hidden;
  font-family: "Arial";
  color: white;
}

/* 打字文字 */
#text {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  font-size: 28px;
  letter-spacing: 2px;
}

/* 小熊 */
#bear {
  position: absolute;
  bottom: -400px;
  left: 50%;
  transform: translateX(-50%) scale(0.6);
  width: 300px;
  opacity: 0;
}

/* 出场动画 */
.showBear {
  animation: popUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* 呼吸动画 */
.breath {
  animation: float 2.5s ease-in-out infinite;
}

@keyframes popUp {
  0% {
    bottom: -400px;
    opacity: 0;
    transform: translateX(-50%) scale(0.3);
  }
  60% {
    bottom: 120px;
    opacity: 1;
    transform: translateX(-50%) scale(1.1);
  }
  100% {
    bottom: 80px;
    transform: translateX(-50%) scale(1);
  }
}

@keyframes float {
  0% { transform: translateX(-50%) translateY(0px) scale(1); }
  50% { transform: translateX(-50%) translateY(-10px) scale(1.03); }
  100% { transform: translateX(-50%) translateY(0px) scale(1); }
}
</style>
</head>

<body>

<div id="text"></div>

<img id="bear" src="bear.png">

<script>
const text1 = "我给你写了一个小程序...";
const text2 = "然后它变成了一只小熊 🐻";
const textEl = document.getElementById("text");
const bear = document.getElementById("bear");

// 打字机效果
let i = 0;
function typing() {
  if (i < text.length) {
    textEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  } else {
    setTimeout(showBear, 500);
  }
}

// 小熊出现
function showBear() {
  bear.classList.add("showBear");

  setTimeout(() => {
    bear.classList.add("breath");
  }, 1000);
}

// 点击互动
bear.onclick = () => {
  alert("这只小熊和我一样，都很喜欢你 ❤️");
};

typing();
</script>

</body>
</html>
